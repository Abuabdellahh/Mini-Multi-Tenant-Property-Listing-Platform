services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: property-platform:latest
    container_name: property-platform
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      # Host port is configurable (default 3002) to avoid local collisions.
      - "${WEB_PORT:-3002}:3000"
    healthcheck:
      # Node 22 has global fetch — no curl/wget needed in the slim image.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
